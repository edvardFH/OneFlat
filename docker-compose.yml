services:
  postgres:
    container_name: postgres
    image: postgres
    environment:
      POSTGRES_USER: onesquad
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - postgres
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - postgres
    restart: unless-stopped

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    networks:
      - backend

  gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    networks:
      - backend
    depends_on:
      - eureka-server
    environment:
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    networks:
      - backend
    depends_on:
      - gateway
      - postgres
    environment:
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka

  accommodation-catalog-service:
    build:
      context: ./accommodation-catalog-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - backend
    depends_on:
      - gateway
      - postgres
    environment:
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka

  reservation-management-service:
    build:
      context: ./reservation-management-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    networks:
      - backend
    depends_on:
      - gateway
      - postgres
    environment:
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka


networks:
  postgres:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres:
  pgadmin: